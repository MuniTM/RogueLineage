<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Khei Guide</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
  <h1>Khei Guide</h1>
  <div class="layout">

    <div class="card">
      <div class="card-header"><span>Spells</span><span id="spellsCount">0/0</span></div>
      <ul class="rows" id="spellsList"></ul>
    </div>

    <div class="card">
      <div class="card-header"><span>Gaia</span><span id="gaiaCount">0/0</span></div>
      <ul class="rows" id="gaiaList"></ul>
    </div>

    <div class="card">
      <div class="card-header"><span>Khei</span><span id="kheiCount">0/0</span></div>
      <ul class="rows" id="kheiList"></ul>
      <div class="row wipe-row disabled" id="wipeRow">
        <span class="label">WIPE (check everything first)</span>
        <div class="checkbox" id="wipeBox"></div>
      </div>
      <div class="hint">Check every item above to unlock Wipe. Clicking Wipe resets everything to off.</div>
    </div>

    <div class="counter-card">
      <div class="cap">Total Wipes</div>
      <div class="counter-num" id="wipeCounter">0</div>
      <div class="counter-sub">cycles 1&ndash;10, then back to 0</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Prereqs</span><span id="progressText">0/0</span></div>
        <div class="bar-bg"><div class="bar-fill" id="progressBar"></div></div>
      </div>
      <div class="save-status" id="saveStatus">Loading...</div>
    </div>

  </div>
</div>

<script>
  const spells = [
    ["Armis", false], ["Gelidus", false], ["Celeritas", false], ["Contrarium", false],
    ["Hystericus", false], ["Ignis", false], ["Nocere", false], ["Sagitta Sol", false],
    ["Scrupus", false], ["Telorum", false], ["Trahere", false], ["Trickstus", false],
    ["Velo", false], ["Viribus", false]
  ];
  const gaia = [
    ["50 Health Potion Forcefeeds", false],
    ["Sick Girl / Rem's Training", false],
    ["Max Illu", false]
  ];
  const khei = [
    ["One Skill Uber", false],
    ["5 Spire Deaths", false]
  ];

  let wipeCount = 0;
  const STORAGE_KEY = "khei-guide-state";
  let saveTimer = null;

  function scheduleSave(){
    clearTimeout(saveTimer);
    setStatus("Saving...");
    saveTimer = setTimeout(saveState, 250);
  }

  async function saveState(){
    const state = { spells, gaia, khei, wipeCount };
    try{
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(state), false);
      setStatus(result ? "Progress saved" : "Save failed - will retry on next change");
    }catch(e){
      console.error("Save failed:", e);
      setStatus("Save failed - will retry on next change");
    }
  }

  async function loadState(){
    try{
      const result = await window.storage.get(STORAGE_KEY, false);
      if(result && result.value){
        const state = JSON.parse(result.value);
        applyLoaded(spells, state.spells);
        applyLoaded(gaia, state.gaia);
        applyLoaded(khei, state.khei);
        if(typeof state.wipeCount === "number") wipeCount = state.wipeCount;
      }
    }catch(e){
      // no saved state yet for this person, or fetch failed - start fresh
      console.log("No saved state found, starting fresh.");
    }
  }

  function applyLoaded(target, saved){
    if(!Array.isArray(saved)) return;
    saved.forEach(([name, checked]) => {
      const match = target.find(i => i[0] === name);
      if(match) match[1] = !!checked;
    });
  }

  function buildList(containerId, items, countId){
    const ul = document.getElementById(containerId);
    items.forEach((item, idx) => {
      const li = document.createElement("li");
      li.className = "row" + (item[1] ? " checked" : "");
      li.dataset.idx = idx;
      li.innerHTML = `<span class="label">${item[0]}</span><div class="checkbox"></div>`;
      li.addEventListener("click", () => {
        item[1] = !item[1];
        li.classList.toggle("checked", item[1]);
        refresh();
        scheduleSave();
      });
      ul.appendChild(li);
    });
    updateCount(items, countId);
  }

  function updateCount(items, countId){
    const done = items.filter(i => i[1]).length;
    document.getElementById(countId).textContent = `${done}/${items.length}`;
  }

  function allChecked(){
    return spells.every(i => i[1]) && gaia.every(i => i[1]) && khei.every(i => i[1]);
  }

  function totalPrereqs(){
    return spells.length + gaia.length + khei.length;
  }
  function doneCount(){
    return spells.filter(i=>i[1]).length + gaia.filter(i=>i[1]).length + khei.filter(i=>i[1]).length;
  }

  function refresh(){
    updateCount(spells, "spellsCount");
    updateCount(gaia, "gaiaCount");
    updateCount(khei, "kheiCount");

    const wipeRow = document.getElementById("wipeRow");
    const ready = allChecked();
    wipeRow.classList.toggle("disabled", !ready);
    wipeRow.classList.toggle("ready", ready);

    const done = doneCount();
    const total = totalPrereqs();
    document.getElementById("progressText").textContent = `${done}/${total}`;
    document.getElementById("progressBar").style.width = (total ? (done/total*100) : 0) + "%";
  }

  document.getElementById("wipeRow").addEventListener("click", () => {
    if (!allChecked()) return;

    // reset everything
    [...spells, ...gaia, ...khei].forEach(item => item[1] = false);
    document.querySelectorAll(".rows .row").forEach(li => li.classList.remove("checked"));

    // increment counter, wrap 1-10 -> 0
    wipeCount = wipeCount + 1;
    if (wipeCount > 10) wipeCount = 0;
    const counterEl = document.getElementById("wipeCounter");
    counterEl.textContent = wipeCount;
    counterEl.classList.remove("flash");
    void counterEl.offsetWidth; // restart animation
    counterEl.classList.add("flash");

    refresh();
    scheduleSave();
  });

  function setStatus(text){
    const el = document.getElementById("saveStatus");
    if(el) el.textContent = text;
  }

  async function init(){
    setStatus("Loading your progress...");
    await loadState();

    buildList("spellsList", spells, "spellsCount");
    buildList("gaiaList", gaia, "gaiaCount");
    buildList("kheiList", khei, "kheiCount");
    document.getElementById("wipeCounter").textContent = wipeCount;
    refresh();
    setStatus("Progress saved to your account");
  }

  init();
</script>
</body>
</html>
